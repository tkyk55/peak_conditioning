{% extends "base.html" %}
{% load widget_tweaks %}
{% load i18n %}
{% block title %}exemail{% endblock %}
{% load bootstrap4 %}
{% block content %}


<div class="row justify-content-center">
    <h2>メールアドレスの有効期限が終了しました</h2>
    <div class="col-lg-8 col-mid-5 col-sm-5">
        <form method="post">
        <table class="shadow-sm table table-bordered bg-light">
            <tbody>
            <tr><td class="px-3 py-3" colspan="2"><p>メールアドレスの有効期限が終了しました</p></td></tr>
            <tr><td><p>認証メールを再送信されたい方は左記の「再送フォームへ」を押してください</p></td><td class="px-2 py-4"><input class="btn btn-primary" type="submit" name="resend" id="ex_booking_resend" value="再送フォームへ" onClick="return exemailResendConf()"></p></td></tr>
            <input type="hidden" name="email" id="ex_booking_resend_email" value="{{ email }}">
            {% csrf_token %}
            </tbody>
        </table>
        <div class="mt-3 md-10 mx-auto text-md-center">
        <p><a class="btn btn-warning" href="/">トップに戻る</a></p>
        </div>
        </form>
    </div>
</div>

{% endblock %}
