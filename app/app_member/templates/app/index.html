{% extends "base.html" %}
{% load i18n %}
{% load bootstrap4 %}

{% block title %}Peak Conditioning{% endblock %}

{% block content %}
    <div class="container my-5">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">

            <div class="card-header text-white text-center py-4 border-0" style="background-color: #0d6efd; border-radius: 0.25rem 0.25rem 0 0;">
                <h1 class="h4 mb-0 font-weight-bold" style="letter-spacing: 1px;">Peak Conditioning</h1>
            </div>

            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-5">
                    <h2 class="h5 font-weight-bold mb-3">予約システムへようこそ</h2>
                    <p class="text-muted small">
                        心身ともに最高のコンディションへ。<br>
                        ご希望のメニューを選択してください。
                    </p>
                    <div class="mx-auto" style="width: 40px; border-top: 3px solid #0d6efd;"></div>
                </div>

                <div class="d-flex flex-column">

                    <div class="mb-4">
                        <p class="text-center font-weight-bold mb-2 small text-primary">初めての方はこちら</p>
                        <a class="btn text-white btn-block py-3 font-weight-bold shadow-sm" href="{% url 'ex_email' %}"
                           style="background-color: #ff8c00; border-radius: 30px; font-size: 1.1rem;">
                            体験トレーニング予約
                        </a>
                    </div>

                    <div class="my-2 border-top"></div> <div class="mt-4">
                    <p class="text-center font-weight-bold mb-2 small text-secondary">会員の方はこちら</p>
                    <a class="btn btn-outline-primary btn-block py-3 font-weight-bold" href="{% url 'login' %}"
                       style="border-radius: 30px; font-size: 1.05rem;">
                        会員ログイン
                    </a>
                </div>

                </div>

            </div>

            <div class="card-footer bg-white border-0 text-center pb-4">
                <a href="https://peak-conditioning.com/" target="_blank" class="text-muted small text-decoration-none">
                    <i class="fas fa-external-link-alt mr-1"></i>公式ホームページを表示
                </a>
            </div>
        </div>
    </div>
{% endblock %}
